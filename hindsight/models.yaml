# HindsightBench runner registry — one entry per audited model.
# Consumed by run_bench.sh (top-level driver). Display metadata (names,
# generation, disclosure marks) lives separately in scripts/bench_registry.py;
# numbers live only in outputs/bench/<key>/<key>_row.json.
#
# Fields:
#   provider   key into scripts/llm_adapters.py PROVIDERS (openai-compatible),
#              or "anthropic" (dedicated runner), or "gemini-legacy" (row
#              derives from the FM-1 core experiments; not re-runnable here)
#   tier       full        = 4 arms x 2-3 reps x 258 dates, LAP 20 reps
#              full-1rep   = 4 arms x 1 rep x 258 dates, LAP 20 reps
#              reduced     = BM-1b window (65 dates, 1 rep, LAP 10)
#   sampling   temperature contract; provider locks are recorded verbatim
#   quant      serving quantization (BM-2a: pin it — E2 is not quant-invariant)
#   notes      preregistered exceptions / adapter quirks

gpt-5.5:              {provider: openai,    tier: full-1rep, sampling: "temp dropped by adapter (gpt-5* rejects it)", quant: api, notes: "cost decision: 1 rep ($30/M output)"}
claude-sonnet-5:      {provider: anthropic, tier: full-1rep, sampling: "provider-default only (rejects non-default; BM1c prereg exception)", quant: api, notes: "batch API run"}
kimi-k2.6:            {provider: kimi,      tier: full,      sampling: "temp locked to 1 (Thinking)", quant: api, notes: "REC probe non-convergent (256/258 exhaust 16k thinking budget); batch truncation >> direct"}
qwen3.6-35b-a3b-fp8:  {provider: remote,    tier: full,      sampling: "temp 0.2", quant: fp8-official, notes: "self-hosted vLLM (H800)"}
qwen3.6-27b-fp8:      {provider: remote,    tier: full,      sampling: "temp 0.2", quant: fp8-official, notes: "self-hosted vLLM (H800); BM-2a reference row"}
gpt-5.4-mini:         {provider: openai,    tier: full,      sampling: "temp dropped by adapter", quant: api}
claude-haiku-4-5:     {provider: anthropic, tier: full,      sampling: "temp 0.2", quant: api, notes: "batch unscheduled 18.5h -> cancelled, completed direct (run_meta marked)"}
deepseek-v4-flash:    {provider: deepseek,  tier: full,      sampling: "temp 0.2", quant: api}
gemini-2.5-flash:     {provider: gemini-legacy, tier: full,  sampling: "temp 0.2", quant: api, notes: "arms symlink into outputs/fm1/ (FM-1 core run); probes native"}
gemini-2.5-pro:       {provider: gemini-legacy, tier: full,  sampling: "temp 0.2", quant: api, notes: "post-cutoff arms not generated (cost decision)"}
qwen3-30b-a3b-fp8dyn: {provider: remote,    tier: full-1rep, sampling: "temp 0.2", quant: fp8-dynamic-vllm, notes: "row 15, from BM-2b GO/KILL stage; REC backfilled 2026-07-09 (same serve config); arm_max_tokens 8192"}
llama-3.1-70b-awq:    {provider: remote,    tier: full,      sampling: "temp 0.2", quant: awq-int4, notes: "self-hosted vLLM (H800)"}
llama-3.1-8b:         {provider: remote,    tier: full,      sampling: "temp 0.2", quant: bf16}
llama3.2:3b:          {provider: ollama,    tier: reduced,   sampling: "temp 0.2", quant: ollama-q4, notes: "VALID 52%: kept with record (compliance gate)"}
